name: Code Quality

# Runs directly on pull requests, and is called by ci.yml (workflow_call) on
# pushes to `next` so the monorepo split only happens once the suite is green.
on:
  pull_request:
    branches:
      - next
  workflow_call:

defaults:
  run:
    working-directory: core

jobs:
  pint:
    name: Code Style
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, dom, fileinfo, bcmath, intl, gd, pdo_sqlite, sqlite3
          coverage: none
          tools: composer:v2

      - name: Install Composer dependencies
        uses: ramsey/composer-install@v3
        with:
          working-directory: core

      - name: Run Pint
        run: vendor/bin/pint --test --parallel

  phpstan:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, dom, fileinfo, bcmath, intl, gd, pdo_sqlite, sqlite3
          coverage: none
          tools: composer:v2

      - name: Install Composer dependencies
        uses: ramsey/composer-install@v3
        with:
          working-directory: core

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=2G

  pest:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, dom, fileinfo, bcmath, intl, gd, imagick, pdo_sqlite, sqlite3
          coverage: none
          tools: composer:v2

      - name: Install media tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg ghostscript
          # ImageMagick ships a policy.xml that blocks the Ghostscript-backed PDF
          # coder by default; allow it so PDF previews can be rasterized.
          for policy in /etc/ImageMagick-6/policy.xml /etc/ImageMagick-7/policy.xml; do
            if [ -f "$policy" ]; then
              sudo sed -i '/PDF/s/rights="none"/rights="read|write"/' "$policy"
            fi
          done

      - name: Install Composer dependencies
        uses: ramsey/composer-install@v3
        with:
          working-directory: core

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run Pest
        run: php artisan test --parallel
